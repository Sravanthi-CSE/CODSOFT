<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster | Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="glass-card">
            <h1>Quiz Complete! 🎉</h1>
            <p>Your hard work paid off. Here is your score:</p>
            <div style="font-size: 4rem; font-weight: 800; color: var(--accent-dark); margin: 20px 0;">
                <span id="final-score">0</span> / 2
            </div>
            <a href="take-quiz.html" class="btn btn-primary">Try Again</a>
            <a href="index.html" class="btn btn-secondary">Home</a>
        </div>
    </main>
    <script>
        document.getElementById('final-score').innerText = localStorage.getItem('finalScore') || 0;
    </script>
</body>
</html>
