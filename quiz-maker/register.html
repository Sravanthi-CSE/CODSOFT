<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join QuizMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <header>
        <nav class="navbar">
            <div class="logo">Quiz<span>Master</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="take-quiz.html">Browse</a></li>
                <li><a href="create-quiz.html">Create</a></li>
                <li><a href="login.html" class="login-btn">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container flex-center">
        <section class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join the community to start creating and sharing quizzes.</p>
            </div>

            <form id="register-form">
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Create Account</button>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 QuizMaster | CodSoft Internship Project</p>
    </footer>

</body>
</html>
