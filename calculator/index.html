<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div class="calculator">
        <div class="header">
            <span class="logo">CALC</span>
            <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>

        <input type="text" id="display" readonly placeholder="0">

        <div class="buttons">
            <!-- Scientific Row -->
            <button class="sci-btn" onclick="scientific('sqrt')">√</button>
            <button class="sci-btn" onclick="scientific('pow')">x²</button>
            <button class="sci-btn" onclick="scientific('pi')">π</button>
            <button class="sci-btn" onclick="scientific('sin')">sin</button>

            <!-- Main Row 1 -->
            <button class="special" onclick="clearDisplay()">C</button>
            <button class="special" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">÷</button>

            <!-- Main Row 2 -->
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <!-- Main Row 3 -->
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <!-- Main Row 4 -->
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <!-- Main Row 5 -->
            <button onclick="appendValue('0')" class="zero">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <!-- Click Sound -->
    <audio id="click-sound" src="https://www.soundjay.com/buttons/button-16.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
